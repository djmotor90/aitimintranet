name: aitim-intranet-dev

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: aitim
      POSTGRES_PASSWORD: aitim
      POSTGRES_DB: aitim_intranet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aitim -d aitim_intranet"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: aitim
      MINIO_ROOT_PASSWORD: aitim-dev-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 aitim aitim-dev-secret;
      mc mb --ignore-existing local/attachments local/photos;
      exit 0"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
  miniodata:
